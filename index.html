<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Opening Kaska…</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f1e8;
      color: #111;
    }
  </style>
</head>

<body>
  <p>Opening Kaska…</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const poster = params.get("poster") || "unknown";

    const trackerUrl =
      "https://script.google.com/macros/s/AKfycbx1VH2KFp0Q8UHuVISaDR3m7OXYjcdFe-fyQuO7Ffdv9gO2ADZfvEOAdqaKtz2viJY/exec" +
      encodeURIComponent(poster) +
      "&logonly=1";

    const instagramUrl =
      "https://www.instagram.com/drinkkaska/" +
      "?utm_source=qr" +
      "&utm_medium=poster" +
      "&utm_campaign=summer_2026" +
      "&utm_content=poster_" +
      encodeURIComponent(poster);

    fetch(trackerUrl, {
      mode: "no-cors",
      keepalive: true
    });

    setTimeout(() => {
      window.location.replace(instagramUrl);
    }, 300);
  </script>
</body>
</html>
