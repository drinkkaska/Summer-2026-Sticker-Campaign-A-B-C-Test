<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Kaska…</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f1e8;
      color: #111;
      font-family: Arial, sans-serif;
    }

    #tracker {
      display: none;
    }
  </style>
</head>

<body>
  <p>Opening Kaska…</p>

  <script>
    const params = new URLSearchParams(window.location.search);

    const allowedPosters = ["a", "b", "c"];
    const requestedPoster = String(
      params.get("poster") || ""
    ).toLowerCase();

    const poster = allowedPosters.includes(requestedPoster)
      ? requestedPoster
      : "unknown";

    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbyHWqB_w_c8mOlfVBZIXfEl89cjloi4PRVC5dsLLpTikkMnaPgfU2ht2M128Gz187HyeA/exec";

    const trackerUrl =
      APPS_SCRIPT_URL +
      "?poster=" +
      encodeURIComponent(poster) +
      "&cache=" +
      Date.now();

    const instagramUrl =
      "https://www.instagram.com/drinkkaska/" +
      "?utm_source=qr" +
      "&utm_medium=poster" +
      "&utm_campaign=summer_2026" +
      "&utm_content=poster_" +
      encodeURIComponent(poster);

    let hasRedirected = false;

    function redirectToInstagram() {
      if (hasRedirected) return;

      hasRedirected = true;
      window.location.replace(instagramUrl);
    }

    const tracker = new Image();

    tracker.id = "tracker";

    tracker.onload = function () {
      setTimeout(redirectToInstagram, 300);
    };

    tracker.onerror = function () {
      setTimeout(redirectToInstagram, 300);
    };

    tracker.src = trackerUrl;

    document.body.appendChild(tracker);

    setTimeout(redirectToInstagram, 5000);
  </script>
</body>
</html>
