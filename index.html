<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Kaska…</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f1e8;
      color: #111;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <p>Opening Kaska…</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const poster = params.get("poster") || "unknown";

    // Replace this with the exact Apps Script URL that worked directly.
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbx1VH2KFp0Q8UHuVISaDR3m7OXYjcdFe-fyQuO7Ffdv9gO2ADZfvEOAdqaKtz2viJY/exec";

    const trackerUrl =
      APPS_SCRIPT_URL +
      "?poster=" +
      encodeURIComponent(poster) +
      "&timestamp=" +
      Date.now();

    const instagramUrl =
      "https://www.instagram.com/drinkkaska/" +
      "?utm_source=qr" +
      "&utm_medium=poster" +
      "&utm_campaign=summer_2026" +
      "&utm_content=poster_" +
      encodeURIComponent(poster);

    async function logAndRedirect() {
      try {
        await Promise.race([
          fetch(trackerUrl, {
            method: "GET",
            mode: "no-cors",
            cache: "no-store"
          }),
          new Promise(resolve => setTimeout(resolve, 3000))
        ]);
      } catch (error) {
        console.error("Scan logging failed:", error);
      } finally {
        window.location.replace(instagramUrl);
      }
    }

    logAndRedirect();
  </script>
</body>
</html>
