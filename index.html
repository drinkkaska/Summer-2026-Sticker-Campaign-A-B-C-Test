<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Kaska…</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f1e8;
      color: #111;
      font-family: Arial, sans-serif;
    }

    iframe {
      display: none;
    }
  </style>
</head>

<body>
  <p>Opening Kaska…</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const poster = params.get("poster") || "unknown";

    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/1RC-C56hNCaGGKW4_aJC6zHVhk3zy_J_yIaMI3FR30j8/exec";

    const trackerUrl =
      APPS_SCRIPT_URL +
      "?poster=" +
      encodeURIComponent(poster) +
      "&timestamp=" +
      Date.now();

    const instagramUrl =
      "https://www.instagram.com/drinkkaska/" +
      "?utm_source=qr" +
      "&utm_medium=poster" +
      "&utm_campaign=summer_2026" +
      "&utm_content=poster_" +
      encodeURIComponent(poster);

    const trackingFrame = document.createElement("iframe");
    trackingFrame.src = trackerUrl;
    trackingFrame.setAttribute("aria-hidden", "true");
    document.body.appendChild(trackingFrame);

    let redirected = false;

    function redirectToInstagram() {
      if (redirected) return;
      redirected = true;
      window.location.replace(instagramUrl);
    }

    trackingFrame.addEventListener("load", () => {
      setTimeout(redirectToInstagram, 500);
    });

    // Fallback in case the iframe load event is blocked or delayed.
    setTimeout(redirectToInstagram, 4000);
  </script>
</body>
</html>
